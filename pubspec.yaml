name: ai_fashion
description: AI-powered wardrobe management and outfit recommendation app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # HTTP & API
  http: ^1.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Image Handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  
  # UI Components
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # Icons
  iconsax: ^0.0.8
  
  # Charts for Analytics
  fl_chart: ^0.65.0
  
  # Date/Time
  intl: ^0.18.1
  
  # Location
  geolocator: ^10.1.0
  
  # Permissions
  permission_handler: ^11.1.0

  # Markdown
  flutter_markdown: ^0.6.18

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true